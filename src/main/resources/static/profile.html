<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTIT Social - Hồ Sơ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#ae1a21', 'primary-dark': '#8a141a' }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/app.css">
</head>

<body class="bg-gray-100 font-sans text-gray-900">

    <!-- NAVBAR -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-white border-b border-gray-200 shadow-sm" style="height:60px">
        <div class="max-w-5xl mx-auto px-5 h-full flex items-center justify-between gap-4">
            <a href="home.html"
                class="flex items-center gap-2 text-primary font-bold text-lg flex-shrink-0 no-underline">
                <img src="/img/logo_ptit.svg" alt="PTIT Logo" class="w-10 h-10 object-contain">
                PTIT Social
            </a>
            <div class="flex items-center gap-1">
                <a href="home.html" class="nav-link"><i class="fas fa-home"></i> Trang chủ</a>
                <a href="friend.html" class="nav-link"><i class="fas fa-user-friends"></i> Bạn bè</a>
                <a href="chat.html" class="nav-link"><i class="fas fa-comment-dots"></i> Tin nhắn</a>
            </div>
            <div class="flex items-center gap-3 flex-shrink-0 relative">
                <div class="relative" id="navAvatarWrap">
                    <button onclick="toggleUserMenu()"
                        class="w-10 h-10 bg-primary rounded-full flex items-center justify-center text-white font-bold focus:outline-none"
                        id="navAvatar">T</button>
                    <div id="userMenu"
                        class="hidden absolute right-0 top-12 bg-white border border-gray-200 rounded-xl shadow-lg w-44 overflow-hidden z-50">
                        <a href="profile.html"
                            class="flex items-center gap-2 px-4 py-3 text-sm text-gray-700 hover:bg-gray-50"><i
                                class="fas fa-user text-primary w-4"></i> Trang cá nhân</a>
                        <a href="#" onclick="logout()"
                            class="flex items-center gap-2 px-4 py-3 text-sm text-gray-700 hover:bg-gray-50"><i
                                class="fas fa-sign-out-alt text-primary w-4"></i> Đăng xuất</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Cover Photo -->
    <div class="pt-15" style="padding-top:60px">
        <div class="h-48 bg-gradient-to-br from-primary via-red-700 to-primary-dark"></div>
    </div>

    <!-- Profile Content -->
    <div class="max-w-2xl mx-auto px-4 pb-10" style="margin-top:-48px; position:relative; z-index:10">

        <!-- Profile Card -->
        <div class="bg-white rounded-2xl shadow-sm p-5 mb-4 flex items-end gap-4">
            <!-- Avatar -->
            <div class="relative flex-shrink-0" style="margin-top:-64px">
                <div id="profileAvatar"
                    class="w-24 h-24 bg-primary rounded-full border-4 border-white flex items-center justify-center text-white font-bold text-3xl overflow-hidden">
                    T</div>
            </div>
            <!-- Info -->
            <div class="flex-1 flex items-center justify-between gap-4 pt-2 min-w-0">
                <div class="min-w-0">
                    <h2 id="profileName" class="text-xl font-bold text-gray-900 truncate">Đang tải...</h2>
                    <p id="profileUsername" class="text-gray-500 text-sm mt-0.5">@username</p>
                </div>
                <button onclick="document.getElementById('editModal').classList.remove('hidden')"
                    class="flex items-center gap-2 border border-gray-200 rounded-full px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 transition flex-shrink-0">
                    <i class="fas fa-pen"></i> Chỉnh sửa
                </button>
            </div>
        </div>

        <!-- Posts label -->
        <h3 class="text-base font-semibold text-gray-800 mb-3 px-1">Bài viết</h3>

        <!-- Posts -->
        <div class="bg-white rounded-2xl shadow-sm p-5 min-h-24">
            <div id="profilePosts">
                <p class="text-center text-gray-400 text-sm py-6">Đang tải bài viết...</p>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden">
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
                <h3 class="font-bold text-gray-900">Chỉnh sửa hồ sơ</h3>
                <button onclick="document.getElementById('editModal').classList.add('hidden')"
                    class="text-gray-400 hover:text-gray-600 text-lg">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="px-6 py-5 space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Họ và
                        tên</label>
                    <input type="text" id="editFullName"
                        class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-primary transition"
                        placeholder="Nhập họ và tên">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">URL Ảnh đại
                        diện</label>
                    <input type="text" id="editAvatar"
                        class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-primary transition"
                        placeholder="https://...">
                </div>
            </div>
            <div class="flex justify-end gap-3 px-6 py-4 border-t border-gray-100">
                <button onclick="document.getElementById('editModal').classList.add('hidden')"
                    class="border border-gray-200 rounded-full px-5 py-2 text-sm font-medium hover:bg-gray-50 transition">Hủy</button>
                <button onclick="saveProfile()"
                    class="bg-primary hover:bg-primary-dark text-white rounded-full px-5 py-2 text-sm font-semibold transition">Lưu</button>
            </div>
        </div>
    </div>

    <a href="chat.html"
        class="fixed bottom-7 right-7 bg-primary hover:bg-primary-dark text-white rounded-full flex items-center justify-center text-xl shadow-lg transition z-40"
        style="width:52px;height:52px">
        <i class="fas fa-comment-dots"></i>
    </a>

    <script src="js/auth.js"></script>
    <script src="js/profile.js"></script>
    <script>
        function toggleUserMenu() { document.getElementById('userMenu').classList.toggle('hidden'); }
        document.addEventListener('click', function (e) {
            if (!document.getElementById('navAvatarWrap').contains(e.target)) document.getElementById('userMenu').classList.add('hidden');
        });
    </script>
</body>

</html>
