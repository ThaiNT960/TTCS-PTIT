<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTIT Social - Hồ Sơ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#ae1a21', 'primary-dark': '#8a141a' }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/app.css">
    <style>
        /* Reaction Styles from PTIT */
        .reaction-container { position: relative; }
        .reaction-menu { 
            position: absolute; bottom: calc(100% + 4px); left: 50%; transform: translateX(-50%); 
            background: white; border-radius: 50px; padding: 4px 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); 
            display: flex; gap: 8px; opacity: 0; pointer-events: none; transition: 0.2s ease-in-out; 
            z-index: 10; border: 1px solid #f3f4f6;
        }
        /* Bridge the gap so hover doesn't drop */
        .reaction-menu::after {
            content: ''; position: absolute; top: 100%; left: 0; width: 100%; height: 12px; background: transparent;
        }
        .reaction-container:hover .reaction-menu { opacity: 1; pointer-events: all; }
        .reaction-icon { font-size: 24px; cursor: pointer; transition: transform 0.2s; display: inline-block; }
        .reaction-icon:hover { transform: scale(1.3) translateY(-4px); }
        .emoji-like { color: #1b74e4; }
        .emoji-haha { color: #f7b125; }
        .emoji-sad { color: #f7b125; }
        .emoji-angry { color: #e9710f; }
        .current-reaction { font-weight: bold; }
        .curr-LIKE { color: #1b74e4 !important; }
        .curr-HAHA { color: #f7b125 !important; }
        .curr-SAD { color: #f7b125 !important; }
        .curr-ANGRY { color: #e9710f !important; }
    </style>
</head>

<body class="bg-gray-100 font-sans text-gray-900">

    <!-- NAVBAR -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-white border-b border-gray-200 shadow-sm" style="height:60px">
        <div class="max-w-5xl mx-auto px-5 h-full flex items-center justify-between gap-4">
            <a href="home.html"
                class="flex items-center gap-2 text-primary font-bold text-lg flex-shrink-0 no-underline">
                <img src="/img/logo_ptit.svg" alt="PTIT Logo" class="w-10 h-10 object-contain">
                PTIT Social
            </a>
            <div class="flex items-center gap-1">
                <a href="home.html" class="nav-link"><i class="fas fa-home"></i> Trang chủ</a>
                <a href="friend.html" class="nav-link"><i class="fas fa-user-friends"></i> Bạn bè</a>
                <a href="chat.html" class="nav-link"><i class="fas fa-comment-dots"></i> Tin nhắn</a>
            </div>
            <div class="flex items-center gap-3 flex-shrink-0 relative">
                <!-- Notifications -->
                <div class="relative" id="notiWrap">
                    <button onclick="toggleNotiMenu()" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-gray-600 hover:bg-gray-200 transition focus:outline-none relative">
                        <i class="fas fa-bell text-lg"></i>
                        <span id="notiBadge" class="hidden absolute -top-1 -right-1 bg-primary text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border-2 border-white">0</span>
                    </button>
                    <div id="notiMenu" class="hidden absolute right-0 top-12 bg-white border border-gray-200 rounded-2xl shadow-xl w-80 overflow-hidden z-50">
                        <div class="px-4 py-3 border-b border-gray-100 flex items-center justify-between">
                            <h3 class="font-bold text-gray-900">Thông báo</h3>
                            <button onclick="markAllNotiAsRead()" class="text-xs text-primary font-semibold hover:underline">Đánh dấu tất cả là đã đọc</button>
                        </div>
                        <div id="notiList" class="max-h-96 overflow-y-auto custom-scrollbar">
                            <p class="text-center text-gray-400 text-sm py-8">Đang tải thông báo...</p>
                        </div>
                    </div>
                </div>

                <div class="relative" id="navAvatarWrap">
                    <button onclick="toggleUserMenu()"
                        class="w-10 h-10 bg-primary rounded-full flex items-center justify-center text-white font-bold focus:outline-none"
                        id="navAvatar">T</button>
                    <div id="userMenu"
                        class="hidden absolute right-0 top-12 bg-white border border-gray-200 rounded-xl shadow-lg w-44 overflow-hidden z-50">
                        <a href="profile.html"
                            class="flex items-center gap-2 px-4 py-3 text-sm text-gray-700 hover:bg-gray-50"><i
                                class="fas fa-user text-primary w-4"></i> Trang cá nhân</a>
                        <a href="#" onclick="logout()"
                            class="flex items-center gap-2 px-4 py-3 text-sm text-gray-700 hover:bg-gray-50"><i
                                class="fas fa-sign-out-alt text-primary w-4"></i> Đăng xuất</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Cover Photo -->
    <div class="pt-15" style="padding-top:60px">
        <div id="profileCover" class="h-64 bg-gradient-to-br from-primary via-red-700 to-primary-dark relative overflow-hidden">
            <!-- Cover image will be injected here -->
        </div>
    </div>

    <!-- Profile Content -->
    <div class="max-w-4xl mx-auto px-4 pb-10" style="margin-top:-64px; position:relative; z-index:10">

        <!-- Profile Card -->
        <div class="bg-white rounded-2xl shadow-sm p-6 mb-6">
            <div class="flex flex-col md:flex-row items-center md:items-end gap-5">
                <!-- Avatar -->
                <div class="relative flex-shrink-0" style="margin-top:-80px">
                    <div id="profileAvatar"
                        class="w-32 h-32 bg-primary rounded-full border-4 border-white shadow-md flex items-center justify-center text-white font-bold text-4xl overflow-hidden">
                        T</div>
                </div>
                <!-- Info -->
                <div class="flex-1 text-center md:text-left pt-2 min-w-0">
                    <h2 id="profileName" class="text-2xl font-bold text-gray-900 truncate">Đang tải...</h2>
                    <p id="profileUsername" class="text-gray-500 font-medium">@username</p>
                    <p id="profileBio" class="mt-2 text-gray-700 text-sm max-w-lg"></p>
                </div>
                <div id="profileActionArea" class="flex-shrink-0 flex items-center gap-2 mt-4 md:mt-0">
                    <button onclick="document.getElementById('editModal').classList.remove('hidden')"
                        class="flex items-center gap-2 border border-gray-200 rounded-full px-5 py-2 text-sm font-semibold text-gray-700 hover:bg-gray-50 transition shadow-sm">
                        <i class="fas fa-pen"></i> Chỉnh sửa
                    </button>
                </div>
            </div>

            <!-- Detail Info Chips -->
            <div id="profileDetails" class="mt-6 flex flex-wrap justify-center md:justify-start gap-4 text-sm text-gray-600 border-t border-gray-50 pt-5">
                <!-- Details will be injected here -->
            </div>
        </div>

        <!-- Profile Navigation Tabs -->
        <div class="bg-white rounded-2xl shadow-sm px-6 flex gap-6 mb-6">
            <button id="tabPostsBtn" onclick="switchTab('posts')" class="py-4 font-bold text-primary border-b-2 border-primary transition outline-none">Bài viết</button>
            <button id="tabFriendsBtn" onclick="switchTab('friends')" class="py-4 font-bold text-gray-500 hover:text-gray-700 border-b-2 border-transparent transition outline-none">Bạn bè <span id="profileFriendCount" class="text-sm font-normal text-gray-400 ml-1"></span></button>
        </div>

        <!-- Posts Tab Content -->
        <div id="tabPostsContent" class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Sidebar (Intro) -->
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white rounded-2xl shadow-sm p-5">
                    <h3 class="font-bold text-gray-900 mb-4">Giới thiệu</h3>
                    <div id="sidebarDetails" class="space-y-3 text-sm">
                        <!-- Details list -->
                    </div>
                </div>
            </div>

            <!-- Main Column (Posts) -->
            <div class="lg:col-span-2">
                <h3 class="text-lg font-bold text-gray-900 mb-4 px-1">Bài viết</h3>
                <div id="profilePosts" class="space-y-4">
                    <div class="bg-white rounded-2xl shadow-sm p-10 text-center">
                        <p class="text-gray-400 text-sm">Đang tải bài viết...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Friends Tab Content -->
        <div id="tabFriendsContent" class="hidden bg-white rounded-2xl shadow-sm p-6 mb-6 min-h-[300px]">
            <h3 class="text-lg font-bold text-gray-900 mb-6">Bạn bè</h3>
            <div id="profileFriendsList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <p class="text-gray-400 text-sm col-span-2 text-center py-8">Đang tải danh sách bạn bè...</p>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]">
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
                <h3 class="font-bold text-lg text-gray-900">Chỉnh sửa hồ sơ</h3>
                <button onclick="document.getElementById('editModal').classList.add('hidden')"
                    class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 text-gray-400 hover:text-gray-600 transition">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="px-6 py-5 space-y-5 overflow-y-auto flex-1 custom-scrollbar">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-wider">Họ và tên</label>
                        <input type="text" id="editFullName"
                            class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition"
                            placeholder="Nhập họ và tên">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-wider">Quyền riêng tư</label>
                        <select id="editPrivacy" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-primary transition">
                            <option value="PUBLIC">Công khai</option>
                            <option value="FRIENDS">Bạn bè</option>
                            <option value="ONLY_ME">Chỉ mình tôi</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-wider">Tiểu sử (Bio)</label>
                    <textarea id="editBio" rows="2"
                        class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-primary transition resize-none"
                        placeholder="Mô tả ngắn về bạn..."></textarea>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-wider">Nơi làm việc</label>
                        <input type="text" id="editWorkplace" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-primary transition" placeholder="Công ty...">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-wider">Học vấn</label>
                        <input type="text" id="editEducation" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-primary transition" placeholder="Trường học...">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-wider">Vị trí hiện tại</label>
                    <input type="text" id="editLocation" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-primary transition" placeholder="Thành phố...">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pt-2">
                    <div class="bg-gray-50 p-3 rounded-xl border border-dashed border-gray-300 relative">
                        <label class="block text-xs font-bold text-gray-500 mb-2 uppercase tracking-wider">Ảnh đại diện</label>
                        <input type="file" id="editAvatarFile" accept="image/*" class="w-full text-xs">
                        <input type="hidden" id="editAvatarUrl">
                        <button onclick="document.getElementById('editAvatarUrl').value=''; alert('Đã gỡ ảnh đại diện')" class="mt-2 text-[10px] text-red-500 font-bold hover:underline">Gỡ ảnh</button>
                    </div>
                    <div class="bg-gray-50 p-3 rounded-xl border border-dashed border-gray-300 relative">
                        <label class="block text-xs font-bold text-gray-500 mb-2 uppercase tracking-wider">Ảnh bìa</label>
                        <input type="file" id="editCoverFile" accept="image/*" class="w-full text-xs">
                        <input type="hidden" id="editCoverUrl">
                        <button onclick="document.getElementById('editCoverUrl').value=''; alert('Đã gỡ ảnh bìa')" class="mt-2 text-[10px] text-red-500 font-bold hover:underline">Gỡ ảnh</button>
                    </div>
                </div>
            </div>
            <div class="flex justify-end gap-3 px-6 py-4 border-t border-gray-100 bg-gray-50">
                <button onclick="document.getElementById('editModal').classList.add('hidden')"
                    class="border border-gray-200 bg-white rounded-full px-6 py-2 text-sm font-semibold text-gray-600 hover:bg-gray-50 transition">Hủy</button>
                <button onclick="saveProfile()"
                    class="bg-primary hover:bg-primary-dark text-white rounded-full px-8 py-2 text-sm font-bold transition shadow-md">Lưu thay đổi</button>
            </div>
        </div>
    </div>

    <!-- Modal Users List -->
    <div id="usersModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-sm overflow-hidden flex flex-col shadow-xl">
            <div class="px-4 py-3 border-b border-gray-100 flex items-center justify-between">
                <h3 class="font-bold text-gray-900" id="usersModalTitle">Danh sách</h3>
                <button onclick="closeUsersModal()" class="text-gray-400 hover:text-gray-700 p-2"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-4 overflow-y-auto max-h-80" id="usersModalBody"></div>
        </div>
    </div>

    <a href="chat.html"
        class="fixed bottom-7 right-7 bg-primary hover:bg-primary-dark text-white rounded-full flex items-center justify-center text-xl shadow-lg transition z-40"
        style="width:52px;height:52px">
        <i class="fas fa-comment-dots"></i>
    </a>

    <script src="js/auth.js"></script>
    <script src="js/profile.js"></script>
    <script>
        function toggleUserMenu() { 
            document.getElementById('userMenu').classList.toggle('hidden');
            const notiMenu = document.getElementById('notiMenu');
            if (notiMenu && !notiMenu.classList.contains('hidden')) {
                notiMenu.classList.add('hidden');
            }
        }
        document.addEventListener('click', function (e) {
            if (!document.getElementById('navAvatarWrap').contains(e.target)) document.getElementById('userMenu').classList.add('hidden');
        });
        function closeUsersModal() {
            document.getElementById('usersModal').classList.add('hidden');
        }
    </script>
</body>

</html>
