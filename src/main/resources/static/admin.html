<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTIT Social - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#ae1a21', 'primary-dark': '#8a141a' }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/app.css">
</head>

<body class="bg-gray-100 font-sans text-gray-900">

    <!-- NAVBAR -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-white border-b border-gray-200 shadow-sm" style="height:60px">
        <div class="max-w-5xl mx-auto px-5 h-full flex items-center justify-between gap-4">
            <a href="home.html"
                class="flex items-center gap-2 text-primary font-bold text-lg flex-shrink-0 no-underline">
                <img src="/img/logo_ptit.svg" alt="PTIT Logo" class="w-10 h-10 object-contain">
                PTIT Social
            </a>
            <div class="flex items-center gap-1">
                <a href="home.html" class="nav-link"><i class="fas fa-home"></i> Trang chủ</a>
                <a href="friend.html" class="nav-link"><i class="fas fa-user-friends"></i> Bạn bè</a>
                <a href="chat.html" class="nav-link"><i class="fas fa-comment-dots"></i> Tin nhắn</a>
                <a href="admin.html" class="nav-link active"><i class="fas fa-shield-alt"></i> Admin</a>
            </div>
            <div class="flex items-center gap-3 flex-shrink-0 relative">
                <div class="relative" id="navAvatarWrap">
                    <button onclick="toggleUserMenu()"
                        class="w-10 h-10 bg-primary rounded-full flex items-center justify-center text-white font-bold focus:outline-none"
                        id="navAvatar">A</button>
                    <div id="userMenu"
                        class="hidden absolute right-0 top-12 bg-white border border-gray-200 rounded-xl shadow-lg w-44 overflow-hidden z-50">
                        <a href="profile.html"
                            class="flex items-center gap-2 px-4 py-3 text-sm text-gray-700 hover:bg-gray-50"><i
                                class="fas fa-user text-primary w-4"></i> Trang cá nhân</a>
                        <a href="#" onclick="logout()"
                            class="flex items-center gap-2 px-4 py-3 text-sm text-gray-700 hover:bg-gray-50"><i
                                class="fas fa-sign-out-alt text-primary w-4"></i> Đăng xuất</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="pt-20 pb-10">
        <div class="max-w-5xl mx-auto px-4">

            <!-- Header -->
            <div class="bg-white rounded-2xl shadow-sm p-6 mb-4">
                <h1 class="text-2xl font-bold text-gray-900 flex items-center gap-3">
                    <i class="fas fa-shield-alt text-primary"></i> Quản trị viên
                </h1>
            </div>

            <!-- Stat Card -->
            <div class="grid grid-cols-3 gap-4 mb-4">
                <div class="bg-white rounded-2xl shadow-sm p-5 flex items-center gap-4">
                    <div class="w-12 h-12 bg-red-50 rounded-xl flex items-center justify-center text-primary text-xl">
                        <i class="fas fa-users"></i>
                    </div>
                    <div>
                        <div id="statUsers" class="text-2xl font-bold text-gray-900">-</div>
                        <div class="text-xs text-gray-500 mt-0.5">Người dùng</div>
                    </div>
                </div>
            </div>

            <!-- Users Table -->
            <div class="bg-white rounded-2xl shadow-sm p-6">
                <div class="flex items-center justify-between mb-5">
                    <h2 class="text-base font-semibold text-gray-900">Danh sách người dùng</h2>
                    <button onclick="document.getElementById('addUserModal').classList.remove('hidden')"
                        class="flex items-center gap-2 bg-primary hover:bg-primary-dark text-white text-sm font-semibold px-4 py-2 rounded-full transition">
                        <i class="fas fa-plus"></i> Thêm
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead>
                            <tr class="border-b border-gray-100">
                                <th
                                    class="text-left text-xs font-semibold text-gray-400 uppercase tracking-wide pb-3 pr-4">
                                    ID</th>
                                <th
                                    class="text-left text-xs font-semibold text-gray-400 uppercase tracking-wide pb-3 pr-4">
                                    Tên</th>
                                <th
                                    class="text-left text-xs font-semibold text-gray-400 uppercase tracking-wide pb-3 pr-4">
                                    Tên đăng nhập</th>
                                <th
                                    class="text-left text-xs font-semibold text-gray-400 uppercase tracking-wide pb-3 pr-4">
                                    Vai trò</th>
                                <th class="text-left text-xs font-semibold text-gray-400 uppercase tracking-wide pb-3">
                                    Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody">
                            <tr>
                                <td colspan="5" class="text-center text-gray-400 py-8">Đang tải...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Add User Modal -->
    <div id="addUserModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden">
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
                <h3 class="font-bold text-gray-900">Thêm người dùng mới</h3>
                <button onclick="document.getElementById('addUserModal').classList.add('hidden')"
                    class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="px-6 py-5 space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Tên đăng
                        nhập</label>
                    <input type="text" id="newUsername"
                        class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-primary transition"
                        placeholder="username">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Họ và
                        tên</label>
                    <input type="text" id="newFullName"
                        class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-primary transition"
                        placeholder="Họ và tên">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Mật
                        khẩu</label>
                    <input type="password" id="newPassword"
                        class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-primary transition"
                        placeholder="Mật khẩu">
                </div>
            </div>
            <div class="flex justify-end gap-3 px-6 py-4 border-t border-gray-100">
                <button onclick="document.getElementById('addUserModal').classList.add('hidden')"
                    class="border border-gray-200 rounded-full px-5 py-2 text-sm font-medium hover:bg-gray-50 transition">Hủy</button>
                <button onclick="createUser()"
                    class="bg-primary hover:bg-primary-dark text-white rounded-full px-5 py-2 text-sm font-semibold transition">Tạo</button>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
    <script>
        function toggleUserMenu() { document.getElementById('userMenu').classList.toggle('hidden'); }
        document.addEventListener('click', function (e) {
            if (!document.getElementById('navAvatarWrap').contains(e.target)) document.getElementById('userMenu').classList.add('hidden');
        });
    </script>
</body>

</html>
