<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTIT Social Chat - Đăng Nhập</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --ptit-red: #C8102E;
        }
        .bg-ptit-red {
            background: linear-gradient(135deg, #C8102E 0%, #A00824 100%);
        }
        .border-ptit-red {
            border-color: #C8102E;
        }
        .text-ptit-red {
            color: #C8102E;
        }
        .hover-ptit-red:hover {
            color: #C8102E;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-lg shadow-2xl p-8 border-t-4 border-ptit-red">
            <div class="text-center mb-8">
                <div class="inline-block bg-ptit-red text-white rounded-full w-16 h-16 flex items-center justify-center mb-4">
                    <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M10.5 1.5H9.5V0h1v1.5zm0 17H9.5v1.5h1V18.5z"></path>
                        <path d="M4.5 4.5L3.64 3.64 2.5 4.79l.86.86 1.14-1.14zm11 11l-.86-.86-1.14 1.14.86.86 1.14-1.14zM1.5 9.5H0v1h1.5v-1zm17 0h-1.5v1H18v-1z"></path>
                    </svg>
                </div>
                <h1 class="text-3xl font-bold text-ptit-red">PTIT Social Chat</h1>
                <p class="text-gray-600 mt-2 text-sm">Mạng xã hội của Học viện PTIT</p>
            </div>

            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-gray-700 font-semibold mb-2 text-sm">Tên đăng nhập</label>
                    <input type="text" id="username" class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-ptit-red transition" placeholder="Nhập tên đăng nhập" required>
                </div>

                <div>
                    <label class="block text-gray-700 font-semibold mb-2 text-sm">Mật khẩu</label>
                    <input type="password" id="password" class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-ptit-red transition" placeholder="Nhập mật khẩu" required>
                </div>

                <button type="submit" class="w-full bg-ptit-red text-white font-semibold py-3 rounded-lg hover:bg-opacity-90 transition shadow-lg">Đăng Nhập</button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-gray-600 text-sm">Chưa có tài khoản? <a href="register.html" class="text-ptit-red font-semibold hover:underline">Đăng ký ngay</a></p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
