<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTIT Social - Trang Chủ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#ae1a21', 'primary-dark': '#8a141a' },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/app.css">
</head>

<body class="bg-gray-100 font-sans text-gray-900">

    <!-- NAVBAR -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-white border-b border-gray-200 shadow-sm " style="height:60px">
        <div class="max-w-5xl mx-auto px-5 h-full flex items-center justify-between gap-4">
            <!-- Logo -->
            <a href="home.html"
                class="flex items-center gap-2 text-primary font-bold text-lg flex-shrink-0 no-underline">
                <img src="/img/logo_ptit.svg" alt="PTIT Logo" class="w-10 h-10 object-contain">
                PTIT Social
            </a>
            <!-- Nav Links -->
            <div class="flex items-center gap-1">
                <a href="home.html" class="nav-link active"><i class="fas fa-home"></i> Trang chủ</a>
                <a href="friend.html" class="nav-link"><i class="fas fa-user-friends"></i> Bạn bè</a>
                <a href="chat.html" class="nav-link"><i class="fas fa-comment-dots"></i> Tin nhắn</a>
            </div>
            <!-- Right -->
            <div class="flex items-center gap-3 flex-shrink-0 relative">
                <!-- Notifications -->
                <div class="relative" id="notiWrap">
                    <button onclick="toggleNotiMenu()" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-gray-600 hover:bg-gray-200 transition focus:outline-none relative">
                        <i class="fas fa-bell text-lg"></i>
                        <span id="notiBadge" class="hidden absolute -top-1 -right-1 bg-primary text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border-2 border-white">0</span>
                    </button>
                    <div id="notiMenu" class="hidden absolute right-0 top-12 bg-white border border-gray-200 rounded-2xl shadow-xl w-80 overflow-hidden z-50">
                        <div class="px-4 py-3 border-b border-gray-100 flex items-center justify-between">
                            <h3 class="font-bold text-gray-900">Thông báo</h3>
                            <button onclick="markAllNotiAsRead()" class="text-xs text-primary font-semibold hover:underline">Đánh dấu tất cả là đã đọc</button>
                        </div>
                        <div id="notiList" class="max-h-96 overflow-y-auto custom-scrollbar">
                            <p class="text-center text-gray-400 text-sm py-8">Đang tải thông báo...</p>
                        </div>
                    </div>
                </div>

                <span id="adminNavLink" style="display:none">
                    <a href="admin.html" class="nav-link text-primary font-semibold"><i class="fas fa-shield-alt"></i>
                        Admin</a>
                </span>
                <div class="relative" id="navAvatarWrap">
                    <button onclick="toggleUserMenu()"
                        class="w-10 h-10 bg-primary rounded-full flex items-center justify-center text-white font-bold text-base focus:outline-none"
                        id="navAvatar">T</button>
                    <div id="userMenu"
                        class="user-menu hidden absolute right-0 top-12 bg-white border border-gray-200 rounded-xl shadow-lg w-44 overflow-hidden z-50">
                        <a href="profile.html"
                            class="flex items-center gap-2 px-4 py-3 text-sm text-gray-700 hover:bg-gray-50"><i
                                class="fas fa-user text-primary w-4"></i> Trang cá nhân</a>
                        <a href="#" onclick="logout()"
                            class="flex items-center gap-2 px-4 py-3 text-sm text-gray-700 hover:bg-gray-50"><i
                                class="fas fa-sign-out-alt text-primary w-4"></i> Đăng xuất</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- PAGE CONTENT -->
    <main class="pt-20 pb-10">
        <div class="max-w-6xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-4 gap-6">
            <!-- Left Sidebar (Search) -->
            <div class="lg:col-span-1 hidden lg:block">
                <div class="bg-white rounded-2xl shadow-sm p-5 sticky" style="top: 84px;">
                    <h3 class="font-bold text-gray-900 mb-4">Tìm kiếm</h3>
                    <input type="text" id="globalSearchInput" 
                        class="w-full bg-gray-100 border border-transparent rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:bg-white focus:border-primary transition mb-3" 
                        placeholder="Tìm bạn bè, bài viết..." onkeyup="if(event.key==='Enter') doGlobalSearch()">
                    <button onclick="doGlobalSearch()" class="w-full bg-primary text-white font-bold rounded-xl py-2.5 text-sm hover:bg-primary-dark transition shadow-sm mb-4">
                        Tìm kiếm
                    </button>
                    <div id="sidebarSearchResults" class="space-y-3 max-h-[60vh] overflow-y-auto custom-scrollbar">
                        <p class="text-xs text-gray-400 text-center">Gõ từ khóa và nhấn Enter</p>
                    </div>
                </div>
            </div>

            <!-- Feed Column -->
            <div class="lg:col-span-3">
                <div id="searchFeedHeader" class="hidden bg-white rounded-2xl shadow-sm mb-4 p-5">
                    <div class="flex items-center justify-between">
                        <h2 class="font-bold text-lg text-gray-900">Kết quả tìm kiếm</h2>
                        <button onclick="clearSearch()" class="text-sm font-semibold text-primary hover:underline">Quay lại Bảng tin</button>
                    </div>
                </div>

                <!-- Create Post -->
                <div id="createPostBlock" class="bg-white rounded-2xl shadow-sm mb-4 p-4">
                <form id="postForm">
                    <div class="flex gap-3 items-center">
                        <div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white font-bold text-sm flex-shrink-0 cursor-pointer" id="createPostAvatar" onclick="window.location.href='profile.html'">U</div>
                        <input type="text" id="postContent" 
                            class="flex-1 bg-gray-100 border border-transparent rounded-full px-4 py-2.5 text-sm text-gray-800 placeholder-gray-500 focus:outline-none focus:bg-gray-200 transition"
                            placeholder="Bạn đang nghĩ gì?" autocomplete="off">
                    </div>
                    <div class="mt-3 border-t border-gray-100 pt-3 flex items-center justify-between">
                        <input type="file" id="postImageFile" accept="image/*,video/*" multiple class="hidden">
                        <div class="flex items-center gap-2 text-gray-500 font-medium text-sm px-4 cursor-pointer hover:bg-gray-50 py-1.5 rounded-lg transition" onclick="document.getElementById('postImageFile').click()">
                            <i class="fas fa-images text-green-500 text-lg"></i><span>Ảnh/Video</span>
                        </div>
                        <button type="submit" id="postSubmitBtn" class="bg-primary hover:bg-primary-dark text-white text-sm font-semibold px-5 py-1.5 rounded-md transition">
                            Đăng
                        </button>
                    </div>
                    <div id="imagePreviewContainer" class="grid grid-cols-3 gap-2 mt-3 hidden"></div>
                </form>
            </div>

            <!-- Posts Feed -->
            <div id="postsFeed"></div>
        </div>
    </main>

    <!-- FAB Chat -->
    <a href="chat.html"
        class="fixed bottom-7 right-7 w-13 h-13 bg-primary hover:bg-primary-dark text-white rounded-full flex items-center justify-center text-xl shadow-lg transition z-40"
        style="width:52px;height:52px">
        <i class="fas fa-comment-dots"></i>
    </a>

    <!-- Modal Users List -->
    <div id="usersModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-sm overflow-hidden flex flex-col shadow-xl">
            <div class="px-4 py-3 border-b border-gray-100 flex items-center justify-between">
                <h3 class="font-bold text-gray-900" id="usersModalTitle">Danh sách</h3>
                <button onclick="closeUsersModal()" class="text-gray-400 hover:text-gray-700 p-2"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-4 overflow-y-auto max-h-80" id="usersModalBody"></div>
        </div>
    </div>

    <!-- Modals style and icon maps -->
    <style>
        .reaction-container { position: relative; }
        .reaction-menu { 
            position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); 
            background: white; border-radius: 50px; padding: 4px 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); 
            display: flex; gap: 8px; opacity: 0; pointer-events: none; transition: 0.2s ease-in-out; 
            margin-bottom: 8px; z-index: 10; border: 1px solid #f3f4f6;
        }
        .reaction-container:hover .reaction-menu { opacity: 1; pointer-events: all; }
        .reaction-icon { font-size: 24px; cursor: pointer; transition: transform 0.2s; display: inline-block; }
        .reaction-icon:hover { transform: scale(1.3) translateY(-4px); }
        .emoji-like { color: #1b74e4; }
        .emoji-haha { color: #f7b125; }
        .emoji-sad { color: #f7b125; }
        .emoji-angry { color: #e9710f; }
        .current-reaction { font-weight: bold; }
        .curr-LIKE { color: #1b74e4; }
        .curr-HAHA { color: #f7b125; }
        .curr-SAD { color: #f7b125; }
        .curr-ANGRY { color: #e9710f; }
    </style>

    <script src="js/auth.js"></script>
    <script src="js/home.js"></script>
    <script>
        function toggleUserMenu() {
            document.getElementById('userMenu').classList.toggle('hidden');
        }
        document.addEventListener('click', function (e) {
            if (!document.getElementById('navAvatarWrap').contains(e.target)) {
                const el = document.getElementById('userMenu');
                if (el) el.classList.add('hidden');
            }
        });
        document.getElementById('postImageFile')?.addEventListener('change', function(e) {
            const preview = document.getElementById('imagePreview');
            if (e.target.files && e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) { preview.src = e.target.result; preview.classList.remove('hidden'); }
                reader.readAsDataURL(e.target.files[0]);
            } else { preview.classList.add('hidden'); }
        });
        function closeUsersModal() {
            document.getElementById('usersModal').classList.add('hidden');
        }
    </script>
</body>
</html>
