<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTIT Social - Trang Chủ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#ae1a21', 'primary-dark': '#8a141a' },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .hashtag-tag { display: inline-block; }
        .hashtag-blue { color: #2563eb; background-color: #eff6ff; padding: 0.125rem 0.375rem; border-radius: 9999px; }
        .hashtag-red { color: #ef4444; background-color: #fef2f2; padding: 0.125rem 0.375rem; border-radius: 9999px; }
        .hashtag-green { color: #16a34a; background-color: #f0fdf4; padding: 0.125rem 0.375rem; border-radius: 9999px; }
        .hashtag-purple { color: #9333ea; background-color: #faf5ff; padding: 0.125rem 0.375rem; border-radius: 9999px; }
        .hashtag-yellow { color: #a16207; background-color: #fefce8; padding: 0.125rem 0.375rem; border-radius: 9999px; }
        .hashtag-default { color: #4b5563; background-color: #f3f4f6; padding: 0.125rem 0.375rem; border-radius: 9999px; }

        /* Reaction Styles from PTIT */
        .reaction-container { position: relative; }
        .reaction-menu { 
            position: absolute; bottom: calc(100% + 4px); left: 50%; transform: translateX(-50%); 
            background: white; border-radius: 50px; padding: 4px 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); 
            display: flex; gap: 8px; opacity: 0; pointer-events: none; transition: 0.2s ease-in-out; 
            z-index: 10; border: 1px solid #f3f4f6;
        }
        /* Bridge the gap so hover doesn't drop */
        .reaction-menu::after {
            content: ''; position: absolute; top: 100%; left: 0; width: 100%; height: 12px; background: transparent;
        }
        .reaction-container:hover .reaction-menu { opacity: 1; pointer-events: all; }
        .reaction-icon { font-size: 24px; cursor: pointer; transition: transform 0.2s; display: inline-block; }
        .reaction-icon:hover { transform: scale(1.3) translateY(-4px); }
        .emoji-like { color: #1b74e4; }
        .emoji-haha { color: #f7b125; }
        .emoji-sad { color: #f7b125; }
        .emoji-angry { color: #e9710f; }
        .current-reaction { font-weight: bold; }
        .curr-LIKE { color: #1b74e4 !important; }
        .curr-HAHA { color: #f7b125 !important; }
        .curr-SAD { color: #f7b125 !important; }
        .curr-ANGRY { color: #e9710f !important; }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/app.css">
</head>

<body class="bg-gray-100 font-sans text-gray-900">

    <!-- NAVBAR -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-white border-b border-gray-200 shadow-sm " style="height:60px">
        <div class="max-w-5xl mx-auto px-5 h-full flex items-center justify-between gap-4">
            <!-- Logo -->
            <a href="home.html"
                class="flex items-center gap-2 text-primary font-bold text-lg flex-shrink-0 no-underline">
                <img src="/img/logo_ptit.svg" alt="PTIT Logo" class="w-10 h-10 object-contain">
                PTIT Social
            </a>
            <!-- Nav Links -->
            <div class="flex items-center gap-1">
                <a href="home.html" class="nav-link active"><i class="fas fa-home"></i> Trang chủ</a>
                <a href="friend.html" class="nav-link"><i class="fas fa-user-friends"></i> Bạn bè</a>
                <a href="chat.html" class="nav-link"><i class="fas fa-comment-dots"></i> Tin nhắn</a>
            </div>
            <!-- Right -->
            <div class="flex items-center gap-3 flex-shrink-0 relative">
                <!-- Notifications -->
                <div class="relative" id="notiWrap">
                    <button onclick="toggleNotiMenu()" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-gray-600 hover:bg-gray-200 transition focus:outline-none relative">
                        <i class="fas fa-bell text-lg"></i>
                        <span id="notiBadge" class="hidden absolute -top-1 -right-1 bg-primary text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border-2 border-white">0</span>
                    </button>
                    <div id="notiMenu" class="hidden absolute right-0 top-12 bg-white border border-gray-200 rounded-2xl shadow-xl w-80 overflow-hidden z-50">
                        <div class="px-4 py-3 border-b border-gray-100 flex items-center justify-between">
                            <h3 class="font-bold text-gray-900">Thông báo</h3>
                            <button onclick="markAllNotiAsRead()" class="text-xs text-primary font-semibold hover:underline">Đánh dấu tất cả là đã đọc</button>
                        </div>
                        <div id="notiList" class="max-h-96 overflow-y-auto custom-scrollbar">
                            <p class="text-center text-gray-400 text-sm py-8">Đang tải thông báo...</p>
                        </div>
                    </div>
                </div>

                <div class="relative" id="navAvatarWrap">
                    <button onclick="toggleUserMenu()"
                        class="w-10 h-10 bg-primary rounded-full flex items-center justify-center text-white font-bold text-base focus:outline-none"
                        id="navAvatar">T</button>
                    <div id="userMenu"
                        class="user-menu hidden absolute right-0 top-12 bg-white border border-gray-200 rounded-xl shadow-lg w-44 overflow-hidden z-50">
                        <a href="profile.html"
                            class="flex items-center gap-2 px-4 py-3 text-sm text-gray-700 hover:bg-gray-50"><i
                                class="fas fa-user text-primary w-4"></i> Trang cá nhân</a>
                        <a href="#" onclick="logout()"
                            class="flex items-center gap-2 px-4 py-3 text-sm text-gray-700 hover:bg-gray-50"><i
                                class="fas fa-sign-out-alt text-primary w-4"></i> Đăng xuất</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- PAGE CONTENT -->
    <main class="pt-20 pb-10">
        <div class="max-w-6xl mx-auto px-4 flex gap-5">
            <!-- LEFT: Main Feed -->
            <div class="flex-1 min-w-0">
                <!-- Search Bar -->
                <div class="bg-white rounded-2xl shadow-sm mb-4 p-3 flex items-center gap-3">
                    <i class="fas fa-search text-gray-400 ml-1"></i>
                    <input type="text" id="searchInput" placeholder="Tìm kiếm bài viết, hashtag..."
                        class="flex-1 bg-transparent text-sm text-gray-800 placeholder-gray-400 focus:outline-none"
                        onkeyup="if(event.key==='Enter') searchPosts()">
                    <button onclick="searchPosts()" class="bg-primary hover:bg-primary-dark text-white text-xs font-semibold px-4 py-2 rounded-full transition">Tìm</button>
                    <button id="clearSearchBtn" onclick="clearSearch()" class="hidden text-xs text-gray-400 hover:text-red-500 transition px-2 py-1"><i class="fas fa-times"></i> Xóa</button>
                </div>

                <!-- Create Post -->
                <div class="bg-white rounded-2xl shadow-sm mb-4 p-5">
                    <form id="postForm">
                        <textarea id="postContent" rows="3"
                            class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm text-gray-800 placeholder-gray-400 resize-none focus:outline-none focus:border-primary focus:bg-white transition"
                            placeholder="Bạn đang nghĩ gì? Dùng #chủ-đề để phân loại bài viết..."></textarea>
                        
                        <!-- Hashtag quick-insert buttons -->
                        <div class="flex flex-wrap gap-1.5 mt-2" id="quickTags">
                            <button type="button" onclick="insertTag('#just-for-fun')" class="text-xs bg-blue-50 text-blue-600 hover:bg-blue-100 px-2.5 py-1 rounded-full transition font-medium">#just-for-fun</button>
                            <button type="button" onclick="insertTag('#quan-trọng')" class="text-xs bg-red-50 text-red-500 hover:bg-red-100 px-2.5 py-1 rounded-full transition font-medium">#quan-trọng</button>
                            <button type="button" onclick="insertTag('#hỏi-đáp')" class="text-xs bg-green-50 text-green-600 hover:bg-green-100 px-2.5 py-1 rounded-full transition font-medium">#hỏi-đáp</button>
                            <button type="button" onclick="insertTag('#chia-sẻ')" class="text-xs bg-purple-50 text-purple-600 hover:bg-purple-100 px-2.5 py-1 rounded-full transition font-medium">#chia-sẻ</button>
                            <button type="button" onclick="insertTag('#học-tập')" class="text-xs bg-yellow-50 text-yellow-700 hover:bg-yellow-100 px-2.5 py-1 rounded-full transition font-medium">#học-tập</button>
                        </div>

                        <!-- Image Upload Preview -->
                        <div id="createPostImagePreviewContainer" class="hidden mt-3 relative inline-block">
                            <img id="createPostImagePreview" src="" class="h-32 rounded-lg object-cover border border-gray-200 shadow-sm">
                            <button type="button" id="cancelPostImagePreview" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs shadow hover:bg-red-600 transition">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                        <input type="file" id="postImageFile" accept="image/*" class="hidden">

                        <div class="flex items-center justify-between mt-3">
                            <div class="flex items-center gap-2 text-gray-500 hover:text-primary transition cursor-pointer text-sm px-2 font-medium" onclick="document.getElementById('postImageFile').click()">
                                <i class="fas fa-image text-lg"></i><span>Hình ảnh</span>
                            </div>
                            <button type="submit" id="postSubmitBtn"
                                class="flex items-center gap-2 bg-primary hover:bg-primary-dark text-white text-sm font-semibold px-5 py-2 rounded-full transition">
                                <i class="fas fa-paper-plane"></i> Đăng
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Search result indicator -->
                <div id="searchIndicator" class="hidden bg-blue-50 border border-blue-200 rounded-2xl p-3 mb-4 flex items-center justify-between">
                    <span class="text-sm text-blue-700"><i class="fas fa-search mr-1"></i>Kết quả tìm kiếm cho: <strong id="searchQueryText"></strong></span>
                    <button onclick="clearSearch()" class="text-xs text-blue-500 hover:text-blue-700 font-medium"><i class="fas fa-times mr-1"></i>Xóa</button>
                </div>

                <!-- Posts Feed -->
                <div id="postsFeed"></div>
            </div>

            <!-- RIGHT: Sidebar -->
            <div class="w-80 flex-shrink-0 space-y-4 hidden lg:block">
                <!-- Announcements Box -->
                <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
                    <div class="bg-gradient-to-r from-primary to-primary-dark px-4 py-3 flex items-center gap-2">
                        <i class="fas fa-bullhorn text-white text-sm"></i>
                        <h3 class="text-white font-semibold text-sm">Thông báo</h3>
                    </div>
                    <div id="announcementsBox" class="p-3 space-y-0 max-h-80 overflow-y-auto w-full">
                        <div class="text-xs text-gray-400 text-center py-4">Đang tải...</div>
                    </div>
                </div>

                <!-- Topics Box -->
                <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
                    <div class="bg-gradient-to-r from-blue-600 to-indigo-600 px-4 py-3 flex items-center gap-2">
                        <i class="fas fa-hashtag text-white text-sm"></i>
                        <h3 class="text-white font-semibold text-sm">Chủ đề nổi bật</h3>
                    </div>
                    <div id="topicsBox" class="p-3 flex flex-wrap gap-1.5 w-full">
                        <div class="text-xs text-gray-400 text-center py-4 w-full">Đang tải...</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Users List -->
    <div id="usersModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-sm overflow-hidden flex flex-col shadow-xl">
            <div class="px-4 py-3 border-b border-gray-100 flex items-center justify-between">
                <h3 class="font-bold text-gray-900" id="usersModalTitle">Danh sách</h3>
                <button onclick="closeUsersModal()" class="text-gray-400 hover:text-gray-700 p-2"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-4 overflow-y-auto max-h-80" id="usersModalBody"></div>
        </div>
    </div>

    <!-- FAB Chat -->
    <a href="chat.html"
        class="fixed bottom-7 right-7 w-13 h-13 bg-primary hover:bg-primary-dark text-white rounded-full flex items-center justify-center text-xl shadow-lg transition z-40"
        style="width:52px;height:52px">
        <i class="fas fa-comment-dots"></i>
    </a>

    <script src="js/auth.js"></script>
    <script src="js/home.js"></script>
    <script>
        function toggleUserMenu() { 
            document.getElementById('userMenu').classList.toggle('hidden');
            const notiMenu = document.getElementById('notiMenu');
            if (notiMenu && !notiMenu.classList.contains('hidden')) {
                notiMenu.classList.add('hidden');
            }
        }
        document.addEventListener('click', function (e) {
            if (!document.getElementById('navAvatarWrap').contains(e.target)) {
                document.getElementById('userMenu').classList.add('hidden');
            }
        });
        function closeUsersModal() {
            document.getElementById('usersModal').classList.add('hidden');
        }
        function insertTag(tag) {
            var ta = document.getElementById('postContent');
            var val = ta.value;
            if (val.length > 0 && val[val.length - 1] !== ' ' && val[val.length - 1] !== '\n') {
                val += ' ';
            }
            ta.value = val + tag + ' ';
            ta.focus();
        }
    </script>
</body>

</html>
